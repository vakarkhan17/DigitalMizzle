<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Update Password | DigitalMizzle</title><meta name="robots" content="noindex"><link rel="stylesheet" href="assets/css/styles.css"><link rel="stylesheet" href="assets/css/access-control.css"></head>
<body class="access-page"><header class="topbar"><nav class="nav shell"><a class="brand" href="index.html"><img class="brand-logo" src="assets/img/digital-mizzle-logo.jpeg" alt="DigitalMizzle logo"><span>DigitalMizzle</span></a></nav></header>
<main class="access-shell access-auth"><section class="access-auth-copy"><span class="eyebrow">Secure recovery</span><h1>Create a new password.</h1><p>Choose a strong password that you have not used elsewhere.</p></section><section class="access-card"><span class="eyebrow">Final recovery step</span><h2>Update password</h2><form id="updatePasswordForm" class="access-form"><label>New Password<div class="password-control"><input id="resetPassword" name="password" type="password" required autocomplete="new-password" placeholder="Create a secure password"><button type="button" data-show-password>Show</button></div></label><div class="password-meter"><div class="password-meter-track"><span id="passwordStrengthBar"></span></div><strong id="passwordStrengthLabel">Start typing</strong></div><div class="password-rules"><span data-password-rule="length">8+ characters</span><span data-password-rule="upper">Uppercase</span><span data-password-rule="lower">Lowercase</span><span data-password-rule="number">Number</span><span data-password-rule="special">Special character</span></div><label>Confirm Password<input name="confirm" type="password" required autocomplete="new-password" placeholder="Repeat password"></label><button class="btn primary" type="submit">Update Password</button><p class="access-message" id="authMessage"></p></form></section></main><script type="module" src="assets/js/access-session.js"></script></body>
</html>
